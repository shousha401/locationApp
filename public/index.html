<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Location Feed · Swarmbox inventory</title>
  <style>
    :root {
      --bg:#0f172a; --panel:#1e293b; --panel2:#172033; --line:#334155;
      --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --accent2:#22d3ee;
      --good:#34d399; --warn:#fbbf24; --err:#f87171; --chip:#0b1220;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text);
      font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    a { color:var(--accent); }
    header { position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:16px;
      padding:12px 20px; background:rgba(15,23,42,.92); backdrop-filter:blur(6px);
      border-bottom:1px solid var(--line); flex-wrap:wrap; }
    header h1 { margin:0; font-size:16px; letter-spacing:.02em; white-space:nowrap; }
    .grow { flex:1 1 auto; }
    .status { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:7px; white-space:nowrap; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); }
    .dot.ok { background:var(--good); } .dot.warn { background:var(--warn); } .dot.err { background:var(--err); }
    .who { font-size:12px; color:var(--muted); }
    .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:.05em; }
    .badge.admin  { background:#3b2a0b; color:var(--warn); border:1px solid #5a4514; }
    .badge.editor { background:#0e3b2e; color:var(--good); border:1px solid #14563f; }
    .badge.viewer { background:#0b2a3b; color:var(--accent); border:1px solid #14415a; }
    a.navlink { color:var(--accent); text-decoration:none; font-size:12px; }
    button.link { background:none; border:0; color:var(--muted); cursor:pointer; font-size:12px; text-decoration:underline; }

    .wrap { max-width:1180px; margin:0 auto; padding:20px; }
    .search { display:flex; gap:10px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
    .search input { flex:1 1 320px; min-width:220px; padding:12px 14px; font-size:16px;
      border-radius:10px; border:1px solid var(--line); background:var(--panel2); color:var(--text); }
    .search input:focus { outline:none; border-color:var(--accent); }
    .hint { color:var(--muted); font-size:12px; margin:2px 2px 20px; }

    .cols { display:grid; grid-template-columns:1fr 320px; gap:20px; align-items:start; }
    @media (max-width:860px){ .cols { grid-template-columns:1fr; } }

    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
    .card h2 { margin:0; padding:13px 16px; font-size:13px; text-transform:uppercase; letter-spacing:.06em;
      color:var(--muted); border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .loc-title { font-size:20px; font-weight:800; color:var(--text); letter-spacing:.03em; }

    .totals { display:flex; gap:22px; padding:12px 16px; flex-wrap:wrap; border-bottom:1px solid var(--line); background:var(--panel2); }
    .stat b { display:block; font-size:19px; } .stat span { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }

    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); position:sticky; top:0; }
    td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
    tr:hover td { background:rgba(56,189,248,.05); }
    .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    .desc { color:var(--muted); }
    .chip { display:inline-block; padding:1px 7px; border-radius:6px; font-size:11px; margin:1px 3px 1px 0;
      background:var(--chip); border:1px solid var(--line); white-space:nowrap; }
    .chip.FRESH { color:var(--good); border-color:#14563f; }
    .chip.DRY { color:var(--warn); border-color:#5a4514; }
    .chip.FROZEN { color:var(--accent2); border-color:#14415a; }
    .chip.TEMP { color:#c4b5fd; border-color:#3b3160; }
    .age-old { color:var(--warn); }
    .barcode { font-size:10px; color:var(--muted); word-break:break-all; max-width:170px; white-space:normal; }

    /* Notes panel */
    .notes { padding:14px 16px; }
    .flags { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .flag { display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:8px;
      border:1px solid var(--line); background:var(--panel2); font-size:12px; cursor:default; user-select:none; }
    .flag.on { border-color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent); }
    .flag.editable { cursor:pointer; }
    .flag.reserved.on { color:var(--accent); }
    .flag.damaged.on { color:var(--err); border-color:var(--err); box-shadow:inset 0 0 0 1px var(--err); }
    .flag.needs_recount.on { color:var(--warn); border-color:var(--warn); box-shadow:inset 0 0 0 1px var(--warn); }
    .flag.do_not_ship.on { color:var(--err); border-color:var(--err); box-shadow:inset 0 0 0 1px var(--err); }
    textarea { width:100%; min-height:90px; resize:vertical; padding:10px; border-radius:9px;
      border:1px solid var(--line); background:var(--panel2); color:var(--text); font:inherit; }
    textarea[readonly] { color:var(--muted); }
    .notes-actions { display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:10px; }
    .notes-actions button { padding:8px 16px; border:0; border-radius:8px; background:var(--accent);
      color:#04222f; font-weight:700; cursor:pointer; }
    .notes-actions button:disabled { opacity:.5; cursor:default; }
    .meta { font-size:11px; color:var(--muted); }
    .readonly-note { font-size:12px; color:var(--muted); font-style:italic; }

    .empty { padding:40px 16px; text-align:center; color:var(--muted); }
    .banner { margin:0 0 16px; padding:10px 14px; border-radius:9px; font-size:13px; }
    .banner.warn { background:#3b2a0b; color:var(--warn); border:1px solid #5a4514; }
    .banner.err { background:#3b0f0f; color:var(--err); border:1px solid #5a1414; }
    .hidden { display:none; }

    /* ── Pallet cards ─────────────────────────────────────────────────────── */
    .pallet { border:1px solid var(--line); border-radius:11px; margin:16px; overflow:hidden; background:var(--panel2); }
    .phead { padding:13px 15px; border-bottom:1px solid var(--line); display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap; }
    .plabel { font-size:10px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); margin-bottom:2px; }
    .pid { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:25px; font-weight:700;
      letter-spacing:.08em; white-space:nowrap; line-height:1.15; }
    .pprod { margin-top:7px; font-size:14px; }
    .pprod b { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    .pmeta { margin-top:6px; font-size:12px; color:var(--muted); }
    .pmeta .sep { opacity:.35; margin:0 2px; }
    .ptot { margin-left:auto; text-align:right; white-space:nowrap; }
    .ptot b { display:block; font-size:20px; }
    .ptot .cap { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }

    .units { width:100%; border-collapse:collapse; }
    .units th { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
      text-align:left; padding:7px 12px; border-bottom:1px solid var(--line); }
    .units td { padding:7px 12px; border-bottom:1px solid rgba(51,65,85,.45); white-space:nowrap; vertical-align:middle; }
    .units tr:last-child td { border-bottom:0; }
    .units tr:hover td { background:rgba(56,189,248,.05); }
    .serial { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:16px; letter-spacing:.04em; }
    .since { font-size:10px; color:var(--muted); margin-top:2px; }
    .chip.late { color:var(--err); border-color:var(--err); }
    .since.late { color:var(--err); font-weight:700; }
    .idx { color:var(--muted); font-size:11px; width:28px; }
    .bcode { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:10px; color:var(--muted);
      max-width:210px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      display:inline-block; vertical-align:middle; }
    .scan { padding:4px 9px; border-radius:6px; border:1px solid var(--line); background:var(--panel);
      color:var(--accent); cursor:pointer; font-size:11px; white-space:nowrap; }
    .scan:hover { border-color:var(--accent); }

    /* ── Barcode overlay. Deliberately WHITE: scanners need dark bars on a light
       background, so this one panel opts out of the dark theme. ───────────── */
    .modal { position:fixed; inset:0; background:rgba(2,6,23,.85); display:none; z-index:50;
      align-items:center; justify-content:center; padding:20px; }
    .modal.on { display:flex; }
    .sheet { background:#fff; color:#0f172a; border-radius:14px; padding:22px 24px;
      max-width:min(94vw,880px); max-height:92vh; overflow:auto; text-align:center; }
    .sheet .cap { font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:#64748b; }
    .sheet .val { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:23px;
      font-weight:700; margin:2px 0 16px; word-break:break-all; }
    .sheet svg { display:block; margin:0 auto; max-width:100%; height:auto; }
    .sheet .digits { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px;
      color:#334155; margin-top:10px; word-break:break-all; }
    .sheet .tip { font-size:11px; color:#64748b; margin-top:12px; }
    .sheet .close { margin-top:16px; padding:9px 24px; border:0; border-radius:8px;
      background:#0f172a; color:#fff; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <h1>📍 Location Feed</h1>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">connecting…</span></div>
    <div class="grow"></div>
    <a class="navlink" href="/dashboard.html">📊 Dashboard</a>
    <a class="navlink" href="/requests.html">💬 Requests</a>
    <a class="navlink hidden" id="usersLink" href="/users.html">👥 Users</a>
    <span class="who" id="who"></span>
    <button class="link" id="logout">Sign out</button>
  </header>

  <div class="wrap">
    <div class="search">
      <input id="loc" list="locs" placeholder="Type a GT location — e.g. GT.2.Z2.C03" autocomplete="off" spellcheck="false">
      <datalist id="locs"></datalist>
    </div>
    <div class="hint" id="hint">Loading locations…</div>

    <div id="banner"></div>

    <div class="cols">
      <div class="card" id="feedCard">
        <div class="empty" id="feedEmpty">Pick a location to see what's in it.</div>
        <div id="feed" class="hidden"></div>
      </div>

      <div class="card hidden" id="notesCard">
        <h2>Notes &amp; flags</h2>
        <div class="notes" id="notes"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    const fmtInt = (n) => Math.round(n).toLocaleString();
    const fmtQty = (n) => (Math.abs(n % 1) < 1e-9 ? Math.round(n).toLocaleString()
      : n.toLocaleString(undefined, { maximumFractionDigits: 2 }));
    const money = (n) => '$' + Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const FLAG_LABELS = { reserved:'Reserved', damaged:'Damaged', needs_recount:'Needs recount', do_not_ship:'Do not ship' };

    let ME = { username:'', role:'viewer' };
    let CURRENT = null;   // current location code
    let DIRTY = false;    // unsaved note edits (so auto-refresh doesn't clobber them)

    function daysSince(dateStr) {
      if (!dateStr) return null;
      // Swarmbox dates are usually bare YYYY-MM-DD; tolerate full timestamps too.
      const d = new Date(String(dateStr).length <= 10 ? dateStr + 'T00:00:00' : dateStr);
      if (isNaN(d)) return null;
      return Math.floor((Date.now() - d.getTime()) / 86400000);
    }

    // ── Snapshot status ────────────────────────────────────────────────────────
    async function refreshStatus() {
      try {
        const s = await (await fetch('/api/status')).json();
        const dot = $('dot'), txt = $('statusText');
        dot.className = 'dot ' + (s.building && !s.ok ? 'warn' : s.ok ? 'ok' : 'err');
        if (!s.ok && s.building) txt.textContent = 'building first snapshot…';
        else if (!s.ok) txt.textContent = 'snapshot unavailable' + (s.lastError ? ' — ' + s.lastError : '');
        else {
          const when = s.builtAt ? new Date(s.builtAt) : null;
          const scope = s.prefix ? `${esc(s.prefix)} · ` : '';
          txt.textContent = `${scope}${fmtInt(s.rowCount)} units · ${fmtInt(s.locationCount)} locations · as of ${when ? when.toLocaleTimeString() : '—'}`
            + (s.building ? ' · refreshing…' : '');
        }
        $('hint').textContent = s.ok
          ? (s.prefix ? `Showing ${esc(s.prefix)} locations only. Start typing to search.` : 'Start typing to search locations. Data refreshes automatically.')
          : (s.building ? 'Pulling inventory from Swarmbox — one moment…' : 'Waiting for Swarmbox…');
        return s;
      } catch (_) {
        $('dot').className = 'dot err'; $('statusText').textContent = 'offline';
        return null;
      }
    }

    // ── Location typeahead ─────────────────────────────────────────────────────
    let searchTimer = null;
    async function updateSuggestions(q) {
      try {
        const r = await (await fetch('/api/locations?q=' + encodeURIComponent(q))).json();
        $('locs').innerHTML = (r.matches || []).map((c) => `<option value="${esc(c)}">`).join('');
      } catch (_) {}
    }
    $('loc').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      const v = e.target.value.trim();
      searchTimer = setTimeout(() => updateSuggestions(v), 150);
      // If the user picked an exact suggestion, load it.
      if ($('locs').querySelector(`option[value="${CSS.escape(v)}"]`)) loadLocation(v);
    });
    $('loc').addEventListener('change', (e) => { const v = e.target.value.trim(); if (v) loadLocation(v); });
    $('loc').addEventListener('keydown', (e) => { if (e.key === 'Enter') { const v = e.target.value.trim(); if (v) loadLocation(v); } });

    // ── Load one location ──────────────────────────────────────────────────────
    async function loadLocation(code, silent) {
      if (!code) return;
      CURRENT = code;
      try {
        const data = await (await fetch('/api/location/' + encodeURIComponent(code))).json();
        renderFeed(data);
        renderNotes(data.code, data.note);
      } catch (_) {
        if (!silent) $('banner').innerHTML = '<div class="banner err">Could not load that location.</div>';
      }
    }

    // ── Code 128 ───────────────────────────────────────────────────────────────
    // Drawn in-page so a scanner can read it straight off the monitor. Written out
    // by hand rather than pulled from a library — this app ships no external deps,
    // and it has to keep working with no internet.
    const C128 = ['212222','222122','222221','121223','121322','131222','122213','122312','132212','221213',
      '221312','231212','112232','122132','122231','113222','123122','123221','223211','221132',
      '221231','213212','223112','312131','311222','321122','321221','312212','322112','322211',
      '212123','212321','232121','111323','131123','131321','112313','132113','132311','211313',
      '231113','231311','112133','112331','132131','113123','113321','133121','313121','211331',
      '231131','213113','213311','213131','311123','311321','331121','312113','312311','332111',
      '314111','221411','431111','111224','111422','121124','121421','141122','141221','112214',
      '112412','122114','122411','142112','142211','241211','221114','413111','241112','134111',
      '111242','121142','121241','114212','124112','124211','411212','421112','421211','212141',
      '214121','412121','111143','111341','131141','114113','114311','411113','411311','113141',
      '114131','311141','411131','211412','211214','211232','2331112'];

    // Code C (2 digits per symbol, so a 44-digit barcode stays a sane width) when the
    // value is all digits and even-length; Code B otherwise (e.g. pallet ids with spaces).
    function code128Codes(text) {
      const s = String(text);
      if (/^\d+$/.test(s) && s.length % 2 === 0) {
        const vals = [];
        for (let i = 0; i < s.length; i += 2) vals.push(parseInt(s.substr(i, 2), 10));
        return { start: 105, vals };
      }
      const vals = [];
      for (const ch of s) {
        const c = ch.charCodeAt(0);
        vals.push(c >= 32 && c <= 126 ? c - 32 : 0);
      }
      return { start: 104, vals };
    }

    function code128SVG(text, moduleW, height) {
      const { start, vals } = code128Codes(text);
      let sum = start;
      vals.forEach((v, i) => { sum += v * (i + 1); });
      const codes = [start, ...vals, sum % 103, 106];   // start, data, checksum, stop
      let bits = '';
      for (const c of codes) {
        let bar = true;
        for (const ch of C128[c]) { bits += (bar ? '1' : '0').repeat(Number(ch)); bar = !bar; }
      }
      const quiet = 10;                                  // mandatory quiet zone
      const w = (bits.length + quiet * 2) * moduleW;
      let rects = '';
      for (let i = 0; i < bits.length;) {
        if (bits[i] === '1') {
          let j = i; while (j < bits.length && bits[j] === '1') j++;
          rects += `<rect x="${(quiet + i) * moduleW}" y="0" width="${(j - i) * moduleW}" height="${height}" fill="#000"/>`;
          i = j;
        } else i++;
      }
      return `<svg viewBox="0 0 ${w} ${height}" width="${w}" height="${height}" xmlns="http://www.w3.org/2000/svg">`
        + `<rect width="${w}" height="${height}" fill="#fff"/>${rects}</svg>`;
    }

    function showBarcode(kind, value) {
      $('sheet').innerHTML = `
        <div class="cap">${esc(kind)}</div>
        <div class="val">${esc(value)}</div>
        ${code128SVG(value, 2, 120)}
        <div class="digits">${esc(value)}</div>
        <div class="tip">Code 128 · scan straight off the screen. Enlarge the window if it won't read.</div>
        <button class="close" id="closeModal">Close</button>`;
      $('modal').classList.add('on');
      $('closeModal').addEventListener('click', hideBarcode);
    }
    const hideBarcode = () => $('modal').classList.remove('on');
    $('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') hideBarcode(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideBarcode(); });
    $('feed').addEventListener('click', (e) => {
      const b = e.target.closest('.scan');
      if (b) showBarcode(b.dataset.kind, b.dataset.bc);
    });

    // ── The feed ───────────────────────────────────────────────────────────────
    // Grouped by PALLET rather than one flat row per unit: a bin is typically one
    // pallet of one product, so a flat table repeats the pallet id, product, PO,
    // manufacturer and date on every one of its 25+ lines. The pallet is the thing
    // a person is actually looking for, so it gets to be the headline.
    function renderFeed(data) {
      $('feedEmpty').classList.add('hidden');
      const feed = $('feed'); feed.classList.remove('hidden');
      $('banner').innerHTML = '';

      if (!data.found) {
        feed.innerHTML = `<div class="empty">No stock currently at <b>${esc(data.code)}</b>.<br>
          <span style="font-size:12px">It may be empty, or not a GT location in the latest snapshot.</span></div>`;
        return;
      }
      const rows = data.rows || [];
      const when = data.builtAt ? new Date(data.builtAt) : null;
      const weightStr = (data.weight || []).length
        ? data.weight.map((w) => `${fmtQty(w.qty)} ${esc(w.uom)}`).join(' · ') : '—';
      const lean = (v) => (v == null ? '—' : (v <= 1 ? (v * 100).toFixed(1) + '%' : fmtQty(v)));
      const ageCell = (d) => {
        if (!d) return '—';
        const days = daysSince(d);
        const cls = days != null && days > 180 ? 'age-old' : '';
        return `<span class="${cls}">${esc(d)}${days != null ? ` (${fmtInt(days)}d)` : ''}</span>`;
      };
      const packCell = (q, u) => (q ? `${fmtQty(q)} <span class="desc">${esc(u || '')}</span>` : '—');
      // Per-unit state with the date it ENTERED that state — for a TEMP unit,
      // "since" is exactly when it stopped being frozen (Clay's ask).
      // TEMP older than 6 days goes red: that's the tempering clock. Only TEMP —
      // an old "since" on FROZEN is harmless and would drown the signal.
      const stateCell = (u) => {
        if (!u.state) return '—';
        const days = daysSince(u.stateDate);
        const late = u.state === 'TEMP' && days != null && days > 6;
        return `<span class="chip ${esc(u.state)}${late ? ' late' : ''}">${esc(u.state)}</span>` +
          (u.stateDate ? `<div class="since${late ? ' late' : ''}">since ${esc(u.stateDate)}${days != null ? ` (${fmtInt(days)}d)` : ''}</div>` : '');
      };

      // Group by pallet + product (a pallet usually holds one product, but don't assume).
      const groups = new Map();
      for (const r of rows) {
        const key = (r.pallet || '~nopallet') + '|' + r.item;
        let g = groups.get(key);
        if (!g) {
          g = { pallet: r.pallet, item: r.item, description: r.description, units: [],
                weight: new Map(), states: new Set(), pos: new Set(), mans: new Set(), oldest: null };
          groups.set(key, g);
        }
        g.units.push(r);
        if (r.varUom) g.weight.set(r.varUom, (g.weight.get(r.varUom) || 0) + r.varQty);
        if (r.state) g.states.add(r.state);
        if (r.po) g.pos.add(r.po);
        if (r.manufacturer) g.mans.add(r.manufacturer);
        if (r.date && (!g.oldest || r.date < g.oldest)) g.oldest = r.date;
      }

      const cards = [...groups.values()].map((g) => {
        const gw = [...g.weight.entries()].map(([u, q]) => `${fmtQty(q)} ${esc(u)}`).join(' · ') || '—';
        const hasLean = g.units.some((u) => u.lean != null);
        const meta = [
          g.mans.size ? [...g.mans].map(esc).join(', ') : null,
          g.pos.size ? 'PO ' + [...g.pos].map(esc).join(', ') : null,
          g.oldest ? 'received ' + ageCell(g.oldest) : null,
          [...g.states].map((s) => `<span class="chip ${esc(s)}">${esc(s)}</span>`).join(' ') || null,
        ].filter(Boolean).join('<span class="sep">·</span>');

        return `
          <div class="pallet">
            <div class="phead">
              <div>
                <div class="plabel">Pallet ID</div>
                <div class="pid">${g.pallet ? esc(g.pallet) : '—'}</div>
                <div class="pprod"><b>${esc(g.item)}</b> · ${esc(g.description) || '—'}</div>
                <div class="pmeta">${meta}</div>
              </div>
              <div class="ptot">
                <b>${gw}</b><div class="cap">${fmtInt(g.units.length)} units</div>
                ${g.pallet ? `<div style="margin-top:9px"><button class="scan" data-kind="Pallet ID" data-bc="${esc(g.pallet)}">▌▌ Scan pallet</button></div>` : ''}
              </div>
            </div>
            <table class="units">
              <thead><tr>
                <th></th><th>Serial</th><th>Pack</th><th>Quantity</th>${hasLean ? '<th>Lean</th>' : ''}<th>State</th><th>Received</th><th>Barcode</th>
              </tr></thead>
              <tbody>
                ${g.units.map((u, i) => `
                  <tr>
                    <td class="idx">${i + 1}</td>
                    <td class="serial">${esc(u.serial) || '—'}</td>
                    <td>${packCell(u.baseQty, u.baseUom)}</td>
                    <td>${packCell(u.varQty, u.varUom)}</td>
                    ${hasLean ? `<td>${lean(u.lean)}</td>` : ''}
                    <td>${stateCell(u)}</td>
                    <td>${ageCell(u.date)}</td>
                    <td>${u.barcode
                      ? `<button class="scan" data-kind="Unit barcode" data-bc="${esc(u.barcode)}">▌▌</button>
                         <span class="bcode" title="${esc(u.barcode)}">${esc(u.barcode)}</span>`
                      : '—'}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>`;
      }).join('');

      feed.innerHTML = `
        <h2><span class="loc-title mono">${esc(data.code)}</span>
          <span class="meta">as of ${when ? when.toLocaleTimeString() : '—'}</span></h2>
        <div class="totals">
          <div class="stat"><b>${fmtInt(data.products)}</b><span>Products</span></div>
          <div class="stat"><b>${fmtInt(data.pallets)}</b><span>Pallets</span></div>
          <div class="stat"><b>${fmtInt(data.lineCount)}</b><span>Units</span></div>
          <div class="stat"><b>${weightStr}</b><span>Total weight</span></div>
        </div>
        ${cards}`;
    }

    // ── Notes & flags ──────────────────────────────────────────────────────────
    function renderNotes(code, note) {
      $('notesCard').classList.remove('hidden');
      // admins outrank editors, so they get the editing controls too
      const isEditor = ME.role === 'editor' || ME.role === 'admin';
      const flags = (note && note.flags) || {};
      const box = $('notes');
      DIRTY = false;

      const flagChips = Object.keys(FLAG_LABELS).map((k) => `
        <div class="flag ${k} ${flags[k] ? 'on' : ''} ${isEditor ? 'editable' : ''}" data-flag="${k}">
          <span>${flags[k] ? '☑' : '☐'}</span>${FLAG_LABELS[k]}
        </div>`).join('');

      const meta = note && note.updatedAt
        ? `<div class="meta">Last edit ${esc(note.updatedBy || '?')} · ${new Date(note.updatedAt).toLocaleString()}</div>`
        : `<div class="meta">No notes yet.</div>`;

      box.innerHTML = `
        <div class="flags">${flagChips}</div>
        <textarea id="noteText" ${isEditor ? '' : 'readonly'} placeholder="${isEditor ? 'Add a note about this location…' : 'No note.'}">${esc((note && note.note) || '')}</textarea>
        <div class="notes-actions">
          ${meta}
          ${isEditor ? '<button id="saveNote" disabled>Save</button>'
            : '<span class="readonly-note">read-only</span>'}
        </div>`;

      if (isEditor) {
        const save = $('saveNote');
        const markDirty = () => { DIRTY = true; save.disabled = false; };
        box.querySelectorAll('.flag.editable').forEach((el) => el.addEventListener('click', () => {
          const on = !el.classList.contains('on');
          el.classList.toggle('on', on);
          el.querySelector('span').textContent = on ? '☑' : '☐';
          markDirty();
        }));
        $('noteText').addEventListener('input', markDirty);
        save.addEventListener('click', () => saveNotes(code));
      }
    }

    async function saveNotes(code) {
      const flags = {};
      $('notes').querySelectorAll('.flag').forEach((el) => { if (el.classList.contains('on')) flags[el.dataset.flag] = true; });
      const body = { note: $('noteText').value, flags };
      const btn = $('saveNote'); btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/notes/' + encodeURIComponent(code), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error();
        const saved = await res.json();
        renderNotes(code, saved);
      } catch (_) {
        btn.disabled = false; btn.textContent = 'Save';
        $('banner').innerHTML = '<div class="banner err">Could not save notes (are you still signed in as an editor?).</div>';
        return;
      }
      btn.textContent = 'Save';
    }

    // ── Boot ───────────────────────────────────────────────────────────────────
    $('logout').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/login.html';
    });

    async function init() {
      try {
        ME = await (await fetch('/api/session')).json();
        $('who').innerHTML = `${esc(ME.username)} <span class="badge ${ME.role}">${esc(ME.role)}</span>`;
        if (ME.role === 'admin') $('usersLink').classList.remove('hidden');
      } catch (_) { location.href = '/login.html'; return; }

      await refreshStatus();
      updateSuggestions('');

      // Deep link from the dashboard: /?loc=GT.2.Z2.C03 opens straight on that bin.
      const want = new URLSearchParams(location.search).get('loc');
      if (want) { $('loc').value = want; loadLocation(want); }

      // Auto-refresh: status every 15s; the open location every 30s (silent, and
      // never while the editor has unsaved note edits).
      setInterval(refreshStatus, 15000);
      setInterval(() => { if (CURRENT && !DIRTY) loadLocation(CURRENT, true); }, 30000);
    }
    init();
  </script>
</body>
</html>
