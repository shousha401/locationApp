<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Location Feed</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --err:#f87171; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--bg);
      color:var(--text); font:15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .card { width:min(360px,92vw); background:var(--card); border:1px solid var(--line);
      border-radius:14px; padding:28px 26px; box-shadow:0 20px 50px rgba(0,0,0,.35); }
    h1 { margin:0 0 4px; font-size:19px; }
    p.sub { margin:0 0 20px; color:var(--muted); font-size:13px; }
    label { display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; text-transform:uppercase; letter-spacing:.04em; }
    input { width:100%; padding:11px 12px; border-radius:9px; border:1px solid var(--line);
      background:#0b1220; color:var(--text); font-size:15px; }
    input:focus { outline:none; border-color:var(--accent); }
    button { width:100%; margin-top:20px; padding:11px; border:0; border-radius:9px; cursor:pointer;
      background:var(--accent); color:#04222f; font-weight:700; font-size:15px; }
    button:disabled { opacity:.6; cursor:default; }
    .err { margin-top:14px; color:var(--err); font-size:13px; min-height:18px; }
    .brand { font-size:12px; color:var(--muted); text-align:center; margin-top:18px; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <h1>📍 Location Feed</h1>
    <p class="sub">Live Swarmbox inventory by location.</p>
    <label for="u">Username</label>
    <input id="u" name="username" autocomplete="username" autofocus required>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required>
    <button id="btn" type="submit">Sign in</button>
    <div class="err" id="err"></div>
    <div class="brand">JD Food · internal</div>
  </form>
  <script>
    const form = document.getElementById('form');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    function nextUrl() {
      const p = new URLSearchParams(location.search).get('next');
      // only same-site relative paths
      return (p && p.startsWith('/') && !p.startsWith('//')) ? p : '/';
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('u').value,
            password: document.getElementById('p').value,
          }),
        });
        if (res.ok) { location.href = nextUrl(); return; }
        const j = await res.json().catch(() => ({}));
        err.textContent = j.error || 'Sign in failed';
      } catch (_) {
        err.textContent = 'Network error';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
